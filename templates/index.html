<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全球新闻聚合</title>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }
      .news-item {
        transition: all 0.2s ease;
      }
      .news-item:hover {
        background-color: #f9fafb;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">
      <!-- 简洁头部 -->
      <header class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-1">全球新闻</h1>
        <div class="flex justify-between items-center">
          <p class="text-sm text-gray-500">今日新闻 · {{ today_date }}</p>
          <a
            href="/list"
            class="px-3 py-1.5 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition"
          >
            查看更多
          </a>
        </div>
      </header>

      <!-- 新闻列表 -->
      <div class="space-y-4">
        {% for media, articles in media_news.items() %}
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
          <h2 class="px-4 py-2 font-semibold text-gray-800 bg-gray-50">
            {{ media }}
          </h2>
          <div class="divide-y divide-gray-100">
            {% for article in articles %}
            <div class="news-item">
              <a
                href="/article/{{ article.id }}"
                class="block px-4 py-3 hover:no-underline"
              >
                <h3
                  class="text-base text-gray-900 leading-tight flex items-start"
                >
                  <span class="text-blue-600 font-bold mr-3 min-w-[2rem]">
                    {{ loop.index | format_number }}
                  </span>
                  {{ article.title }}
                </h3>
              </a>
            </div>
            {% endfor %}
          </div>
        </div>
        {% endfor %}
      </div>

      <!-- 底部 -->
      <footer
        class="mt-8 pt-4 border-t border-gray-200 text-center text-sm text-gray-500"
      >
        <p>全球新闻聚合 · 今日热点</p>
      </footer>
    </div>
  </body>
</html>
